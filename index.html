<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
    <script src="index.js" defer></script>
</head>
<body>
    <main>
        <div class="container">
            <output class="expression" aria-label="Expression display"></output>
            <output class="answer" aria-label="Answer display" aria-live="polite"></output>
            <div class="operands-container">
                <div class="row">
                    <button class="choice control" type="button">Clear</button>
                    <button class="choice control" type="button">Del</button>
                    <button class="choice operator" type="button">=</button>
                </div>
                <div class="row">
                    <button class="choice number" type="button">7</button>
                    <button class="choice number" type="button">8</button>
                    <button class="choice number" type="button">9</button>
                    <button class="choice operator" type="button">-</button>
                </div>
                <div class="row">
                    <button class="choice number" type="button">4</button>
                    <button class="choice number" type="button">5</button>
                    <button class="choice number" type="button">6</button>
                    <button class="choice operator" type="button">+</button>
                </div>
                <div class="row">
                    <button class="choice number" type="button">1</button>
                    <button class="choice number" type="button">2</button>
                    <button class="choice number" type="button">3</button>
                    <button class="choice operator" type="button">x</button>
                </div>
                <div class="row">
                    <button class="choice operator" type="button">%</button>
                    <button class="choice number" type="button">0</button>
                    <button class="choice number" type="button">.</button>
                    <button class="choice operator" type="button">/</button>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
